<!DOCTYPE html>
<html>
<head>
    <title>Vault Admin Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-[#020617] text-white p-10 font-sans">
    <h1 class="text-4xl font-black text-cyan-400 mb-10 italic uppercase tracking-widest">Payment Approval Gateway</h1>
    <div id="list" class="grid gap-6"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBhTOWBvfqDvmDW03FOF5OqEq8HRv5dMME",
            authDomain: "vault-messenger-fcb60.firebaseapp.com",
            projectId: "vault-messenger-fcb60",
            databaseURL: "https://vault-messenger-fcb60-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('payments').on('value', (snap) => {
            const container = document.getElementById('list');
            container.innerHTML = "";
            snap.forEach(child => {
                const data = child.val();
                if(data.status === 'pending') {
                    container.innerHTML += `
                    <div class="bg-white/5 p-8 rounded-[2rem] flex justify-between items-center border border-white/10 shadow-2xl">
                        <div>
                            <p class="text-[10px] text-slate-500 font-black uppercase mb-1">Transaction ID</p>
                            <p class="text-cyan-300 font-mono text-xl font-bold">${data.trx}</p>
                        </div>
                        <button onclick="approve('${child.key}')" class="bg-cyan-500 text-black px-10 py-4 rounded-2xl font-black uppercase text-xs hover:bg-white transition-all shadow-lg shadow-cyan-500/20">Approve Access</button>
                    </div>`;
                }
            });
        });

        function approve(key) {
            db.ref('payments/' + key).update({ status: 'approved' });
            alert("APPROVED: Access granted to user.");
        }
    </script>
</body>
</html>
